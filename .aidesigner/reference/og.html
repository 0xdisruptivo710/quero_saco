<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#0033CC;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:90px;position:relative;overflow:hidden}
.grid{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.12) 1.5px,transparent 1.5px);background-size:26px 26px}
.badge{width:120px;height:120px;background:#fff;color:#0033CC;border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:62px;letter-spacing:-3px;margin-bottom:40px}
h1{font-size:96px;font-weight:900;letter-spacing:-3px;line-height:.95;text-transform:uppercase}
.pp{color:#cdd9ff;font-weight:800;letter-spacing:6px;font-size:24px;margin-top:14px}
p{margin-top:34px;font-size:32px;color:#e7ecff;max-width:900px;font-weight:500}
.bar{position:absolute;bottom:0;left:0;right:0;height:16px;background:#1A1A1A}
</style></head><body>
<div class="grid"></div>
<div class="badge">QS</div>
<h1>Quero Saco</h1>
<div class="pp">PLASTIC &amp; PAPER · FÁBRICA E ATACADISTA</div>
<p>Descartáveis institucionais com qualidade e escala — sacos de lixo, papel interfolha e mais. Entrega em todo o Rio de Janeiro.</p>
<div class="bar"></div>
</body></html>
