<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
.tile{width:900px;height:675px;background:#0033CC;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;position:relative;overflow:hidden}
.tile .g{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.10) 2px,transparent 2px);background-size:34px 34px}
.tile .e{font-size:200px;line-height:1;filter:drop-shadow(0 8px 18px rgba(0,0,0,.25))}
.tile .n{font-size:46px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;text-align:center;max-width:740px;padding:0 30px;line-height:1.05}
.tile .bar{position:absolute;bottom:0;left:0;right:0;height:14px;background:#1A1A1A}
</style></head><body>
<div id="t0" class="tile"><div class="g"></div><div class="e">🌱</div><div class="n">Sacos para Terra, Areia e Entulho</div><div class="bar"></div></div>
<div id="t1" class="tile"><div class="g"></div><div class="e">🧊</div><div class="n">Sacos para Gelo</div><div class="bar"></div></div>
<div id="t2" class="tile"><div class="g"></div><div class="e">🛒</div><div class="n">Sacos para Cesta Básica</div><div class="bar"></div></div>
<div id="t3" class="tile"><div class="g"></div><div class="e">🏥</div><div class="n">Lençol Hospitalar Descartável</div><div class="bar"></div></div>
</body></html>
